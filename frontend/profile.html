<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - HackSolve</title>
    <link rel="stylesheet" href="public/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: var(--bg-darker);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding-bottom: 100px;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .bg-blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            filter: blur(120px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.1;
            animation: blobMove 25s infinite alternate;
        }

        @keyframes blobMove {
            0% { transform: translate(-20%, -20%) rotate(0deg); }
            100% { transform: translate(25%, 25%) rotate(360deg); }
        }

        .profile-container {
            max-width: 650px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .header-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 40px;
            display: flex;
            align-items: center;
            gap: 40px;
            box-shadow: var(--shadow-soft);
            position: relative;
            overflow: hidden;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .logout-btn-corner {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(255, 118, 117, 0.1);
            border: 1px solid rgba(255, 118, 117, 0.2);
            color: #ff7675;
            padding: 10px 20px;
            border-radius: 14px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            width: auto !important;
            transition: all 0.3s cubic-bezier(0.2, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .logout-btn-corner:hover {
            background: #ff7675;
            color: white;
            opacity: 1;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 118, 117, 0.2);
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-val {
            display: block;
            font-size: 1.2em;
            font-weight: 700;
            color: var(--text-main);
        }

        .stat-label {
            font-size: 0.75em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .grid-item {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            transition: all 0.3s;
            height: 250px;
            box-shadow: var(--shadow-soft);
        }

        .grid-item:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-3d);
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .edit-input {
            margin-bottom: 20px !important;
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid var(--glass-border) !important;
            color: var(--text-main) !important;
            border-radius: 14px !important;
            padding: 12px 15px !important;
        }

        .edit-input:focus {
            background: rgba(255, 255, 255, 0.1) !important;
            border-color: var(--primary) !important;
            outline: none;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .section-tab {
            font-weight: 800;
            color: var(--text-main);
            padding-bottom: 8px;
            border-bottom: 3px solid var(--primary);
            font-size: 0.85em;
            letter-spacing: 1.5px;
            display: inline-block;
            margin-bottom: 25px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <!-- Global HackSolve Branding -->
    <a href="/feed" style="position: absolute; top: 25px; left: 30px; display: flex; align-items: center; gap: 12px; text-decoration: none; z-index: 10000;">
        <div style="width: 38px; height: 38px; background: linear-gradient(135deg, var(--primary, #818cf8) 0%, var(--accent, #fb7185) 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(129, 140, 248, 0.4);">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <span style="font-family: 'Inter', sans-serif; font-size: 1.5rem; font-weight: 800; background: linear-gradient(to right, #818cf8, #fb7185); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px;">HackSolve</span>
    </a>
    <div class="bg-blob"></div>
    <div class="bg-blob" style="bottom: -10%; right: -10%; background: var(--accent); animation-delay: -10s;"></div>

    <div class="profile-container">
        <div class="header-glass">
            <button id="logoutBtn" class="logout-btn-corner" onclick="logout()">Logout</button>
            <div id="profPic" class="profile-pic">U</div>
            <div class="profile-info">
                <h2 id="profName" style="margin:0; font-size: 1.8em; font-weight: 700;">Loading...</h2>
                <p id="profUser" style="color:var(--primary-light); font-weight: 600; font-size: 1em; margin: 4px 0;">@loading</p>
                <div id="profBio" style="font-size: 0.95em; color: var(--text-muted); margin-top: 10px; line-height: 1.5;">Innovation enthusiast & Problem Solver.</div>
                
                <div class="stats">
                    <div class="stat-item">
                        <span id="postCount" class="stat-val">0</span>
                        <span class="stat-label">Posts</span>
                    </div>
                    <div class="stat-item">
                        <span id="followerCount" class="stat-val">0</span>
                        <span class="stat-label">Followers</span>
                    </div>
                    <div class="stat-item">
                        <span id="followingCount" class="stat-val">0</span>
                        <span class="stat-label">Following</span>
                    </div>
                    <div class="stat-item">
                        <span id="hackCount" class="stat-val">0</span>
                        <span class="stat-label">Hacks</span>
                    </div>
                </div>

                <div style="display:flex; gap:12px; margin-top: 25px;">
                    <button id="editProfileBtn" class="professional-btn btn-primary" onclick="openEditModal()" style="width: auto; padding: 12px 25px; font-size: 0.9em;">Edit Profile</button>
                    <button id="followBtn" class="professional-btn" onclick="toggleFollow()" style="display:none; width: auto; padding: 12px 30px; font-size: 0.9em; background:var(--primary); color:white; border:none;">Follow</button>
                </div>
            </div>
        </div>

        <div style="margin-top: 40px;">
            <span class="section-tab">MY POSTS</span>
            <div id="postsGrid" class="posts-grid">
                <!-- Posts injected here -->
            </div>
        </div>
    </div>

    <!-- EDIT PROFILE MODAL -->
    <div id="editModal" class="modal-overlay" onclick="closeEditModal()">
        <div class="container-3d" style="width: 380px; margin: 0; padding: 20px; max-height: 85vh; overflow-y: auto;" onclick="event.stopPropagation()">
            <h2 style="margin-bottom: 12px; font-size: 1.4em; text-align: center;">Edit Profile</h2>
            
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px; background: rgba(108, 92, 231, 0.03); padding: 8px; border-radius: 12px; border: 1px solid var(--glass-border);">
                <div style="position:relative;">
                    <div id="photoPreview" class="profile-pic" style="width:45px; height:45px; margin:0; position:relative; overflow:hidden; font-size: 0.8em;">U</div>
                    <button onclick="clearPhotoSelection()" id="removePhotoBtn" style="position:absolute; top:-5px; right:-8px; background:#ff7675; border:none; border-radius:50%; width:18px; height:18px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:white; font-size:10px; box-shadow:0 2px 5px rgba(0,0,0,0.2);">🗑️</button>
                </div>
                <div style="flex:1;">
                    <label style="font-size: 0.55em; color: var(--text-muted); font-weight: 800; text-transform: uppercase; display:block; margin-bottom:2px;">Profile Photo</label>
                    <input type="file" id="editPhoto" accept="image/*" style="background:none; border:none; padding:0; font-size:0.7em; width:100%; margin:0;" onchange="previewImage(event)">
                </div>
            </div>

            <div style="margin-bottom: 8px;">
                <label style="font-size: 0.55em; color: var(--text-muted); font-weight: 800; margin-left: 5px; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 2px;">Full Name</label>
                <input type="text" id="editName" class="edit-input" placeholder="Your Name" style="margin-bottom: 0; padding: 10px 15px; font-size: 0.85em;">
            </div>
            
            <div style="margin-bottom: 8px;">
                <label style="font-size: 0.55em; color: var(--text-muted); font-weight: 800; margin-left: 5px; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 2px;">Email Address</label>
                <input type="email" id="editEmail" class="edit-input" placeholder="email@example.com" style="margin-bottom: 0; padding: 10px 15px; font-size: 0.85em;">
            </div>
            
            <div style="margin-bottom: 8px;">
                <label style="font-size: 0.55em; color: var(--text-muted); font-weight: 800; margin-left: 5px; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 2px;">Bio</label>
                <textarea id="editBio" style="width:100%; background:rgba(108, 92, 231, 0.05); border:1px solid var(--glass-border); border-radius:10px; color:var(--text-main); padding:10px; font-family:inherit; font-size:0.85em; margin-bottom:0; min-height:60px; outline:none; transition: 0.3s;"></textarea>
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="font-size: 0.55em; color: var(--text-muted); font-weight: 800; margin-left: 5px; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 2px;">New Password</label>
                <input type="password" id="editPass" class="edit-input" placeholder="••••••••" style="margin-bottom: 0; padding: 10px 15px; font-size: 0.85em;">
            </div>

            <div style="display:flex; gap:8px;">
                <button onclick="saveProfile()" class="professional-btn btn-primary" style="margin:0; flex: 1; padding: 10px; font-size: 0.9em;">Update Profile</button>
                <button onclick="closeEditModal()" class="professional-btn" style="background: rgba(108, 92, 231, 0.05); color: var(--text-main); margin:0; width: auto; padding: 0 15px; border-color: var(--glass-border); font-size: 0.8em;">Cancel</button>
            </div>
        </div>
    </div>

    <div class="navbar">
        <a href="/feed" class="nav-icon">🏠</a>
        <a href="/hackathons" class="nav-icon">🏆</a>
        <a href="/feed" class="nav-icon">➕</a>
        <a href="/my-applications" class="nav-icon">📁</a>
        <a href="/profile" class="nav-icon active">👤</a>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("user"));
        if (!user) window.location.href = "/";

        const urlParams = new URLSearchParams(window.location.search);
        const profileId = urlParams.get('id') || user.id;
        const isOwnProfile = profileId === user.id;

        function logout() { 
            localStorage.clear(); 
            window.location.href = "/"; 
        }

        async function loadProfile() {
            try {
                // Adjust UI for self vs others
                if (!isOwnProfile) {
                    document.getElementById("editProfileBtn").style.display = "none";
                    document.getElementById("logoutBtn").style.display = "none";
                    document.getElementById("followBtn").style.display = "block";
                    document.querySelector(".section-tab").innerText = "USER POSTS";
                }

                // Fetch Public Profile Data
                const resData = await fetch(`/api/user/${profileId}/profile-data?current_user_id=${user.id}`);
                const data = await resData.json();

                if (data.success) {
                    const p = data.user;
                    document.getElementById("profName").innerText = p.name;
                    document.getElementById("profUser").innerText = `@${p.username}`;
                    
                    const pic = document.getElementById("profPic");
                    if (p.profilePhoto) {
                        pic.innerHTML = `<img src="/${p.profilePhoto}" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;">`;
                    } else {
                        pic.innerText = p.name.charAt(0).toUpperCase();
                        pic.innerHTML = p.name.charAt(0).toUpperCase();
                    }

                    if (p.bio) document.getElementById("profBio").innerText = p.bio;
                    
                    document.getElementById("followerCount").innerText = p.followersCount || 0;
                    document.getElementById("followingCount").innerText = p.followingCount || 0;

                    if (!isOwnProfile) {
                        const btn = document.getElementById("followBtn");
                        if (p.isFollowing) {
                            btn.innerText = "Following";
                            btn.style.background = "rgba(108, 92, 231, 0.1)";
                            btn.style.color = "var(--primary)";
                            btn.style.border = "1px solid var(--glass-border)";
                        } else {
                            btn.innerText = "Follow";
                            btn.style.background = "var(--primary)";
                            btn.style.color = "white";
                            btn.style.border = "none";
                        }
                    }
                }

                // Fetch Posts
                const resPosts = await fetch(`/api/posts/user/${profileId}`);
                const posts = await resPosts.json();
                document.getElementById("postCount").innerText = posts.length;

                const grid = document.getElementById("postsGrid");
                grid.innerHTML = posts.length === 0 ? "<p style='grid-column: 1/3; text-align:center; color:var(--text-muted); margin-top:30px; font-weight:500;'>No posts yet.</p>" : "";

                posts.forEach(p => {
                    grid.innerHTML += `
                        <div class="grid-item">
                            ${p.imagePath ? `<img src="/${p.imagePath}">` : `<div style="height:100%; background:rgba(108, 92, 231, 0.05); display:flex; align-items:center; justify-content:center; color:var(--text-muted);">No image</div>`}
                            <div style="position:absolute; bottom:0; left:0; width:100%; padding:15px; background:linear-gradient(transparent, rgba(0,0,0,0.8)); color:white; font-size:0.8em; pointer-events:none;">${p.description.substring(0, 50)}...</div>
                            ${isOwnProfile ? `<button onclick="deletePost('${p._id}')" style="position:absolute; top:10px; right:10px; background:rgba(255,118,117,0.2); border:none; border-radius:10px; color:white; padding:5px; cursor:pointer; backdrop-filter:blur(5px);">🗑️</button>` : ""}
                        </div>
                    `;
                });

                // Fetch Hackathons Joined
                const resHacks = await fetch(`/api/user/${profileId}/hackathons`);
                const hacks = await resHacks.json();
                document.getElementById("hackCount").innerText = hacks.length;
            } catch (err) {
                console.error(err);
            }
        }

        async function toggleFollow() {
            const btn = document.getElementById("followBtn");
            btn.disabled = true;
            
            try {
                const res = await fetch("/api/user/follow", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ follower_id: user.id, target_id: profileId })
                });
                const data = await res.json();
                if (data.success) {
                    loadProfile(); // Refresh UI
                }
            } catch (err) {
                console.error(err);
            } finally {
                btn.disabled = false;
            }
        }

        let shouldRemovePhoto = false;

        function clearPhotoSelection() {
            shouldRemovePhoto = true;
            document.getElementById("editPhoto").value = "";
            document.getElementById("photoPreview").innerHTML = user.name.charAt(0).toUpperCase();
            document.getElementById("photoPreview").innerText = user.name.charAt(0).toUpperCase();
        }

        function previewImage(event) {
            shouldRemovePhoto = false;
            const preview = document.getElementById("photoPreview");
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;">`;
                }
                reader.readAsDataURL(file);
            }
        }

        function openEditModal() {
            shouldRemovePhoto = false;
            document.getElementById("editName").value = user.name;
            document.getElementById("editEmail").value = user.email || "";
            document.getElementById("editBio").value = user.bio || "";
            document.getElementById("editPass").value = "";
            
            const preview = document.getElementById("photoPreview");
            if (user.profilePhoto) {
                preview.innerHTML = `<img src="/${user.profilePhoto}" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;">`;
            } else {
                preview.innerText = user.name.charAt(0).toUpperCase();
            }

            document.getElementById("editModal").classList.add("active");
        }

        function closeEditModal() {
            document.getElementById("editModal").classList.remove("active");
        }

        async function saveProfile() {
            const name = document.getElementById("editName").value;
            const email = document.getElementById("editEmail").value;
            const bio = document.getElementById("editBio").value;
            const password = document.getElementById("editPass").value;
            const photoFile = document.getElementById("editPhoto").files[0];

            if (!name) return alert("Name is required");

            const formData = new FormData();
            formData.append("user_id", user.id);
            formData.append("name", name);
            formData.append("email", email);
            formData.append("bio", bio);
            formData.append("removePhoto", shouldRemovePhoto);
            if (password) formData.append("password", password);
            if (photoFile) formData.append("profilePhoto", photoFile);

            const res = await fetch("/api/update-profile", {
                method: "POST",
                body: formData
            });

            const data = await res.json();
            if (data.success) {
                localStorage.setItem("user", JSON.stringify(data.user));
                alert("Profile updated!");
                location.reload();
            } else {
                alert("Update failed");
            }
        }

        async function deletePost(postId) {
            if (!confirm("Are you sure?")) return;
            const res = await fetch(`/api/posts/${postId}`, { method: 'DELETE' });
            if ((await res.json()).success) loadProfile();
        }

        loadProfile();
    </script>
</body>
</html>
