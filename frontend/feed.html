<!DOCTYPE html>
<html>

<head>
    <title>HackSolve - Feed</title>
    <link rel="stylesheet" href="public/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: var(--bg-darker);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding-bottom: 100px;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .bg-blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            filter: blur(120px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.1;
            animation: blobMove 25s infinite alternate;
        }

        @keyframes blobMove {
            0% { transform: translate(-20%, -20%) rotate(0deg); }
            100% { transform: translate(25%, 25%) rotate(360deg); }
        }

        .top-bar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-title {
            font-family: cursive;
            font-size: 1.8em;
            font-weight: 700;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .post-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            margin: 20px auto;
            max-width: 500px;
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            transition: transform 0.3s;
        }

        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-3d);
        }

        .post-header {
            padding: 15px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(108, 92, 231, 0.2);
        }

        .category-badge {
            font-size: 0.65em;
            padding: 4px 10px;
            border-radius: 20px;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            margin-top: 4px;
        }

        .post-image {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 0;
        }

        .post-visual-placeholder {
            height: 300px;
            background: linear-gradient(45deg, rgba(108, 92, 231, 0.05), rgba(253, 121, 168, 0.05));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-weight: 500;
            font-size: 0.9em;
            position: relative;
        }

        .post-actions {
            padding: 12px 18px;
            display: flex;
            gap: 15px;
        }

        .action-icon {
            font-size: 1.4em;
            cursor: pointer;
            transition: transform 0.2s;
            background: none;
            border: none;
            padding: 0;
            color: var(--text-muted);
        }

        .action-icon:hover {
            transform: scale(1.1);
            color: var(--primary);
        }

        .post-content {
            padding: 0 18px 20px;
        }

        .like-count {
            font-weight: 700;
            font-size: 0.9em;
            margin-bottom: 8px;
            border-radius: 10px;
            font-size: 0.75em;
            font-weight: 700;
            color: white;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .plus-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }

        .btn-cancel {
            width: 100%;
            padding: 12px;
            background: none;
            color: var(--text-muted);
            border: none;
            margin-top: 10px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-cancel:hover {
            color: var(--text-main);
            text-decoration: underline;
        }

        .search-container {
            margin: 20px auto 10px;
            max-width: 500px;
            padding: 0 15px;
        }

        .search-container input {
            padding: 12px 20px 12px 45px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%23818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>') no-repeat 15px center;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--glass-border);
            font-size: 0.95em;
            color: var(--text-main);
        }

        .search-container input:focus {
            background-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(129, 140, 248, 0.15);
            outline: none;
        }
    </style>
</head>

<body>
    <div class="bg-blob"></div>
    <div class="bg-blob" style="bottom: -10%; right: -10%; background: var(--accent); animation-delay: -15s;"></div>

    <div class="top-bar">
        
        <div style="display: flex; align-items: center; gap: 12px; text-decoration: none; cursor: pointer;" onclick="window.location.href='/feed'">
            <div style="width: 38px; height: 38px; background: linear-gradient(135deg, var(--primary, #818cf8) 0%, var(--accent, #fb7185) 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(129, 140, 248, 0.4);">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <span style="font-family: 'Inter', sans-serif; font-size: 1.5rem; font-weight: 800; background: linear-gradient(to right, #818cf8, #fb7185); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px;">HackSolve</span>
        </div>
        <div id="uAvatarTop" class="user-avatar" style="margin:0; width:40px; height:40px;">U</div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="professional-input" placeholder="Search ideas, tech, or hackathons..." onkeyup="filterFeed()">
        <div id="filterStatus" style="display:none; margin-top:10px; font-size:0.85em; color:var(--primary); font-weight:700;">
            Filtering by Category: <span id="activeCategory"></span> 
            <button onclick="clearFilter()" style="background:none; border:none; color:#ff7675; cursor:pointer; font-weight:700; text-decoration:underline;">Clear Filter</button>
        </div>
    </div>

    <div class="feed-container" style="margin-top: 10px;">
        <div id="feedList">
            <!-- Posts injected here -->
        </div>
    </div>

    <div id="plusModal" class="plus-modal" onclick="closePlus(event)">
        <div class="container-3d" style="width: 400px; margin: 0; padding: 35px;" onclick="event.stopPropagation()">
            <h2 style="margin: 0 0 10px 0; font-size: 1.8em;">Create New</h2>
            <p style="color: var(--text-muted); font-size: 0.95em; margin-bottom: 25px; font-weight: 500;">Share your innovation or host an event.</p>
            
            <button class="professional-btn" style="background: var(--primary); color: white;" onclick="window.location.href='/create-post'">📝 Share an Idea</button>
            <button id="adminOnlyHack" class="professional-btn" style="background: #00d2ff; color: white;" onclick="window.location.href='/create-hackathon'">🏆 Host Hackathon</button>
            <button onclick="togglePlusMenu()" class="btn-cancel">Cancel</button>
        </div>
    </div>

    <div class="navbar">
        <a href="/feed" class="nav-icon active">🏠</a>
        <a href="/hackathons" class="nav-icon">🏆</a>
        <div class="nav-icon" onclick="togglePlusMenu()">➕</div>
        <a href="/my-applications" class="nav-icon">📁</a>
        <a href="/profile" class="nav-icon">👤</a>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("user"));
        if (!user) window.location.href = "/";

        const topAv = document.getElementById("uAvatarTop");
        if (user.profilePhoto) {
            topAv.innerHTML = `<img src="/${user.profilePhoto}" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;">`;
        } else {
            topAv.innerText = user.name ? user.name.charAt(0).toUpperCase() : "U";
        }
        if (user.role !== 'admin') document.getElementById('adminOnlyHack').style.display = 'none';

        function togglePlusMenu() {
            const modal = document.getElementById("plusModal");
            modal.style.display = (modal.style.display === "none" || modal.style.display === "") ? "flex" : "none";
        }
        function closePlus(e) { togglePlusMenu(); }

        function timeAgo(date) {
            const seconds = Math.floor((new Date() - new Date(date)) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + " years ago";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + " months ago";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + " days ago";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + " hours ago";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + " minutes ago";
            return Math.floor(seconds) + " seconds ago";
        }

        const categoryColors = {
            "Technology": "#0984e3", "Education": "#6c5ce7", "Society": "#00b894", "Innovation": "#fdcb6e",
            "Environment": "#2ecc71", "Health": "#d63031", "Open Innovation": "#636e72", "Hackathon Ideas": "#e17055"
        };

        async function loadFeed() {
            const urlParams = new URLSearchParams(window.location.search);
            const category = urlParams.get('category');
            
            let url = `/api/posts`;
            if (category) {
                url += `?category=${encodeURIComponent(category)}`;
                document.getElementById("filterStatus").style.display = "block";
                document.getElementById("activeCategory").innerText = category;
            }

            const res = await fetch(url);
            const data = await res.json();
            const list = document.getElementById("feedList");
            list.innerHTML = "";

            data.forEach(post => {
                const isLiked = post.upvotes && post.upvotes.includes(user.id);
                const badgeColor = categoryColors[post.category] || "#636e72";

                const commentsHtml = (post.comments || []).slice(-2).map(c => `
                    <div class="comment-item" style="font-size:0.9em; margin-bottom: 4px;">
                        <span class="username-bold" style="font-weight:700; color:var(--primary); margin-right:8px;">${c.username}</span>
                        <span style="color:var(--text-main); opacity:0.8;">${c.text}</span>
                    </div>
                `).join("");

                const avatarHtml = post.authorPhoto 
                    ? `<img src="/${post.authorPhoto}" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;">`
                    : (post.authorName ? post.authorName.charAt(0).toUpperCase() : 'U');

                list.innerHTML += `
                <div class="post-card fade-in">
                    <div class="post-header">
                        <div class="user-avatar" style="cursor:pointer;" onclick="window.location.href='/profile?id=${post.authorId}'" title="View Profile">${avatarHtml}</div>
                        <div style="flex:1;">
                            <div style="display:flex; align-items:center; gap:8px;">
                                <span class="username-bold" style="font-weight:700; font-size:1.05em; color:var(--text-main); cursor:pointer;" onclick="window.location.href='/profile?id=${post.authorId}'" title="View Profile">${post.authorName}</span>
                                <span style="font-size:0.75em; color:var(--text-muted);">• ${post.authorRole || 'User'}</span>
                            </div>
                            <span class="category-badge" style="background:${badgeColor}">${post.category}</span>
                        </div>
                        ${(user.id === post.authorId || user.role === 'admin') ? `
                            <button onclick="deletePost('${post._id}')" class="action-icon" style="margin-left:auto; color:#ff7675;" title="Delete Post">🗑️</button>
                        ` : ''}
                    </div>
                    
                    ${post.imagePath ? `<img src="/${post.imagePath}" class="post-image">` :
                        `<div class="post-visual-placeholder">
                            <span style="font-size:3em; opacity:0.1; position:absolute;">💡</span>
                            <span style="z-index:1;">Idea Visual</span>
                        </div>`}

                    <div class="post-actions">
                        <button class="action-icon" onclick="toggleLike('${post._id}', this)" style="color:${isLiked ? 'var(--accent)' : 'var(--text-muted)'}">
                            ${isLiked ? '❤️' : '🤍'}
                        </button>
                        <button class="action-icon" onclick="focusComment('${post._id}')">💬</button>

                    </div>

                    <div class="post-content">
                        <div class="like-count">${post.upvotes ? post.upvotes.length : 0} Supports</div>
                        <div style="font-size:0.95em; line-height:1.5; color: var(--text-main);">
                            <span class="username-bold" style="color:var(--primary); margin-right:8px; font-weight:700;">${post.authorName}</span>${post.description}
                        </div>
                        
                        <div style="margin-top:15px; background: rgba(0,0,0,0.03); border-radius: 12px; padding: ${post.comments.length > 0 ? '12px' : '0'};">
                            <div style="color:var(--text-muted); font-size:0.85em; cursor:pointer; margin-bottom: ${post.comments.length > 0 ? '8px' : '0'};" onclick="viewComments('${post._id}')">
                                ${post.comments.length > 0 ? `View all ${post.comments.length} comments` : 'Add first comment...'}
                            </div>
                            <div id="preview-comments-${post._id}">${commentsHtml}</div>
                        </div>
                        
                        <span class="timestamp">${timeAgo(post.date)}</span>
                    </div>

                    <div style="display:flex; padding: 15px 18px; border-top: 1px solid var(--glass-border);">
                        <input type="text" id="comment-input-${post._id}" 
                            style="background:none; border:none; color:var(--text-main); flex:1; outline:none; font-size:0.9em; padding:0;" 
                            placeholder="Add a comment...">
                        <button style="background:none; border:none; color:var(--primary); font-weight:700; cursor:pointer; width:auto; margin:0;" onclick="postComment('${post._id}')">Post</button>
                    </div>
                </div>
                `;
            });
        }

        async function toggleLike(id, btn) {
            const res = await fetch("/api/posts/upvote", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ post_id: id, user_id: user.id })
            });
            const data = await res.json();
            if (data.success) loadFeed();
        }

        async function postComment(postId) {
            const input = document.getElementById(`comment-input-${postId}`);
            const text = input.value;
            if (!text) return;

            const res = await fetch("/api/posts/comment", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ post_id: postId, user_id: user.id, username: user.name, text })
            });
            const data = await res.json();
            if (data.success) {
                input.value = "";
                loadFeed();
            }
        }

        function focusComment(id) { document.getElementById(`comment-input-${id}`).focus(); }

        function clearFilter() {
            window.location.href = "/feed";
        }

        function filterFeed() {
            const query = document.getElementById("searchInput").value.toLowerCase();
            const cards = document.querySelectorAll(".post-card");
            cards.forEach(card => card.style.display = card.innerText.toLowerCase().includes(query) ? "block" : "none");
        }

        async function deletePost(postId) {
            if (!confirm("Are you sure you want to delete this post?")) return;
            try {
                const res = await fetch(`/api/posts/${postId}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    loadFeed();
                } else {
                    alert("Failed to delete post: " + data.error);
                }
            } catch (err) {
                console.error(err);
                alert("Error deleting post");
            }
        }

        loadFeed();
    </script>
</body>

</html>
