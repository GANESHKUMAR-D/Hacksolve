<!DOCTYPE html>
<html>

<head>
    <title>Community Complaints</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Global HackSolve Branding -->
    <a href="/feed" style="position: absolute; top: 25px; left: 30px; display: flex; align-items: center; gap: 12px; text-decoration: none; z-index: 10000;">
        <div style="width: 38px; height: 38px; background: linear-gradient(135deg, var(--primary, #818cf8) 0%, var(--accent, #fb7185) 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(129, 140, 248, 0.4);">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <span style="font-family: 'Inter', sans-serif; font-size: 1.5rem; font-weight: 800; background: linear-gradient(to right, #818cf8, #fb7185); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px;">HackSolve</span>
    </a>

    <div class="bg-blob"></div>
    <div class="bg-blob" style="bottom: -10%; right: -10%; background: var(--accent); animation-delay: -12s; opacity: 0.08;"></div>

    <div class="container-3d" style="width: 700px; margin: 50px auto;">
        <h2 style="margin-bottom: 8px; font-weight: 700; background: linear-gradient(to right, #fff, #a29bfe); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Community Complaints</h2>

        <div id="complaintList" style="margin-top:20px; max-height: 600px; overflow-y: auto; text-align: left;"></div>

        <button onclick="window.location.href='/home'" style="margin-top:20px; background: #636e72;">Back to
            Home</button>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("user"));
        if (!user) window.location.href = "/";

        async function loadOthersComplaints() {
            // Fetch complaints where user_id IS NOT current user.id
            const res = await fetch("/api/complaints/others/" + user.id);
            const complaints = await res.json();
            const list = document.getElementById("complaintList");
            list.innerHTML = "";

            if (complaints.length === 0) {
                list.innerHTML = "<p style='text-align:center;'>No other complaints found.</p>";
                return;
            }

            complaints.forEach(c => {
                const isUpvoted = c.upvotes && c.upvotes.includes(user.id);
                // Comments HTML
                let commentsHtml = "";
                if (c.comments) {
                    c.comments.forEach(com => {
                        commentsHtml += `<div style="font-size:0.85em; background:rgba(0,0,0,0.05); padding:5px; margin:5px 0; border-radius:5px;">
                            <strong>${com.username}</strong>: ${com.text}
                        </div>`;
                    });
                }

                list.innerHTML += `
                <div style="background:var(--glass-bg); padding:25px; margin:20px 0; border-radius:24px; color:var(--text-main); border: 1px solid var(--glass-border); box-shadow: var(--shadow-soft); backdrop-filter: blur(15px);">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b style="color:var(--primary-light); text-transform:uppercase; letter-spacing:1px; font-size:0.85em;">Department: ${c.category}</b> 
                        <span style="background:${c.status == 'Resolved' ? 'rgba(0,184,148,0.2)' : 'rgba(230,126,34,0.2)'}; color:${c.status == 'Resolved' ? '#00b894' : '#e67e22'}; padding:6px 14px; border-radius:12px; font-size:0.75em; font-weight:800;">${c.status}</span>
                    </div>
                    <div style="font-size:0.85em; color:var(--text-muted); margin: 10px 0;">Posted on ${new Date(c.date).toLocaleDateString()}</div>
                    
                    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(c.address)}" target="_blank" style="color:var(--primary-light); text-decoration:none; font-weight: 600; font-size: 0.9em; display: flex; align-items: center; gap: 5px;">📍 ${c.address}</a> 
                    <p style="margin-top:15px; line-height: 1.6; color: rgba(255,255,255,0.9); font-weight: 500;">${c.description}</p>
                    
                    ${c.image_path ? `<img src="/${c.image_path}" style="width:100%; max-height: 350px; object-fit: cover; border-radius:18px; margin-top:15px; border: 1px solid var(--glass-border);">` : ""}

                    <!-- ACTIONS -->
                    <div style="margin-top:20px; padding-top:15px; border-top:1px solid var(--glass-border); display:flex; gap:15px; align-items:center;">
                        <button onclick="upvote('${c._id}')" 
                             style="width:auto; padding:8px 18px; font-size:0.9em; background:${isUpvoted ? 'var(--primary)' : 'rgba(255,255,255,0.05)'}; color:white; border-radius:20px; border: 1px solid ${isUpvoted ? 'var(--primary)' : 'var(--glass-border)'}; cursor: pointer; font-weight: 700; transition: 0.3s;">
                             👍 ${c.upvotes ? c.upvotes.length : 0}
                        </button>
                        <span style="font-size:0.9em; color:var(--text-muted); font-weight: 500;">💬 ${c.comments ? c.comments.length : 0} Comments</span>
                    </div>

                    <!-- COMMENTS SECTION -->
                    <div style="margin-top:15px; max-height:120px; overflow-y:auto; padding-right: 5px;">
                        ${commentsHtml || "<p style='color:var(--text-muted); font-size:0.85em; font-style:italic;'>No comments yet.</p>"}
                    </div>
                    <div style="display:flex; margin-top:15px; gap:10px;">
                        <input type="text" id="comment-${c._id}" placeholder="Write a comment..." style="margin:0; padding:12px 15px; font-size:0.9em; border:1px solid var(--glass-border); flex-grow:1; background: rgba(255,255,255,0.03); border-radius: 12px; color: white; outline: none;">
                        <button onclick="postComment('${c._id}')" style="width:auto; padding:10px 20px; font-size:0.85em; background:var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer;">Send</button>
                    </div>
                </div>
                `;
            });
        }

        async function upvote(id) {
            await fetch("/api/complaint/upvote", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ complaint_id: id, user_id: user.id })
            });
            loadOthersComplaints(); // Reload to update UI
        }

        async function postComment(id) {
            const text = document.getElementById(`comment-${id}`).value;
            if (!text) return;

            await fetch("/api/complaint/comment", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ complaint_id: id, user_id: user.id, username: user.name, text })
            });
            loadOthersComplaints();
        }

        loadOthersComplaints();
    </script>
</body>

</html>
