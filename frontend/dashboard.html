<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Concern - HackSolve</title>
    <link rel="stylesheet" href="public/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: var(--bg-darker);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .bg-blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            filter: blur(120px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.1;
            animation: blobMove 25s infinite alternate;
        }

        @keyframes blobMove {
            0% { transform: translate(-20%, -20%) rotate(0deg); }
            100% { transform: translate(25%, 25%) rotate(360deg); }
        }

        .container-3d {
            max-width: 600px;
            margin: 50px auto;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 45px;
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-3d);
            position: relative;
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 2.2em;
            font-weight: 800;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 0.85em;
            color: var(--text-main);
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            font-size: 1em;
            color: var(--text-main);
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.1);
        }

        textarea {
            height: 120px;
            resize: none;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 35px;
            font-size: 1.05em;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.2);
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(108, 92, 231, 0.35);
        }

        .btn-cancel {
            width: 100%;
            padding: 12px;
            background: none;
            color: var(--text-muted);
            border: none;
            margin-top: 15px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: 0.3s;
            text-align: center;
            display: block;
            text-decoration: none;
        }

        .btn-cancel:hover {
            color: var(--text-main);
            text-decoration: underline;
        }

        .top-bar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-title {
            font-size: 1.6em;
            font-weight: 800;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div class="bg-blob"></div>
    <div class="bg-blob" style="bottom: -10%; right: -10%; background: var(--accent); animation-delay: -10s;"></div>

    <div class="top-bar">
        <div style="display:flex; align-items:center; gap: 20px;">
		
        <div style="display: flex; align-items: center; gap: 12px; text-decoration: none; cursor: pointer;" onclick="window.location.href='/feed'">
            <div style="width: 38px; height: 38px; background: linear-gradient(135deg, var(--primary, #818cf8) 0%, var(--accent, #fb7185) 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(129, 140, 248, 0.4);">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <span style="font-family: 'Inter', sans-serif; font-size: 1.5rem; font-weight: 800; background: linear-gradient(to right, #818cf8, #fb7185); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px;">HackSolve</span>
        </div>
		<span class="header-title">HackSolve Concerns</span>
		</div>
    </div>

    <div class="container-3d fade-in">
        <h2>Raise a Concern 🚨</h2>
        <p style="color: var(--text-muted); font-size: 1em; margin-bottom: 30px; font-weight: 500;">Report issues or suggest improvements directly to our departments.</p>

        <form id="complaintForm" enctype="multipart/form-data">
            <label>Concern Category</label>
            <select id="category" name="category" required>
                <option value="Roads & Transport">Roads & Transport</option>
                <option value="Water Supply">Water Supply</option>
                <option value="Electricity">Electricity</option>
                <option value="Public Safety">Public Safety</option>
                <option value="Sanitation">Sanitation</option>
                <option value="Other">Other</option>
            </select>

            <label>Description</label>
            <textarea name="description" placeholder="Provide detailed information about the issue..." required></textarea>

            <label>Location / Address</label>
            <input type="text" name="address" placeholder="e.g. 123 Innovation Lab, Sector 4" required>

            <label>Attachments (Optional)</label>
            <input type="file" name="image" accept="image/*" style="padding: 10px 0;">

            <button type="submit" class="btn-submit">Submit Report</button>
            <a href="/home" class="btn-cancel">Cancel and Return</a>
        </form>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("user"));
        if (!user) window.location.href = "/";

        document.getElementById("complaintForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerText = "Submitting...";

            const formData = new FormData(e.target);
            formData.append("user_id", user.id);
            formData.append("username", user.name);

            try {
                const res = await fetch("/api/complaint", {
                    method: "POST",
                    body: formData
                });
                const data = await res.json();
                if (data.success) {
                    alert("Report Submitted Successfully!");
                    window.location.href = "/view-my-complaints";
                } else {
                    alert("Error: " + data.message);
                    btn.disabled = false;
                    btn.innerText = "Submit Report";
                }
            } catch (err) {
                console.error(err);
                btn.disabled = false;
                btn.innerText = "Submit Report";
            }
        });
    </script>
</body>
</html>
